name: Android Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  android-release:
    name: Build and Publish Android Release
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '22'
      PNPM_VERSION: '10'
      JAVA_VERSION: '17'
      NDK_VERSION: '29.0.13846066'
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/src-tauri/release.keystore
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG_NAME" >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            ANDROID_VERSION_CODE=$((10#${BASH_REMATCH[1]} * 1000000 + 10#${BASH_REMATCH[2]} * 1000 + 10#${BASH_REMATCH[3]}))
          else
            echo "Invalid semantic version for Android versionCode: $VERSION" >&2
            exit 1
          fi

          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "android_version_code=${ANDROID_VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Synchronize release version
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          ANDROID_VERSION_CODE="${{ steps.meta.outputs.android_version_code }}"

          VERSION="$VERSION" node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;

          for (const file of ['package.json', 'src-tauri/tauri.conf.json']) {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            data.version = version;
            fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          }

          const cargoPath = 'src-tauri/Cargo.toml';
          const cargo = fs.readFileSync(cargoPath, 'utf8');
          fs.writeFileSync(cargoPath, cargo.replace(/(^\[package\][\s\S]*?^version\s*=\s*)"[^"]+"/m, `$1"${version}"`));
          NODE

          mkdir -p src-tauri/gen/android/app
          {
            echo "// THIS IS AN AUTOGENERATED FILE. DO NOT EDIT THIS FILE DIRECTLY."
            echo "tauri.android.versionName=${VERSION}"
            echo "tauri.android.versionCode=${ANDROID_VERSION_CODE}"
          } > src-tauri/gen/android/app/tauri.properties

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${ANDROID_KEYSTORE_PATH}"
          test -s "${ANDROID_KEYSTORE_PATH}"

      - name: Resolve Android signing alias
        shell: bash
        run: |
          KEYTOOL_OUTPUT=$(printf '%s\n' "${ANDROID_KEYSTORE_PASSWORD}" | keytool -list -v -keystore "${ANDROID_KEYSTORE_PATH}")
          mapfile -t KEY_ALIASES < <(printf '%s\n' "${KEYTOOL_OUTPUT}" | awk -F': ' '/^Alias name: / {print $2}')

          if [[ "${#KEY_ALIASES[@]}" -eq 0 ]]; then
            echo "No key aliases found in Android keystore" >&2
            exit 1
          fi

          RESOLVED_ALIAS=""
          if [[ -n "${ANDROID_KEY_ALIAS:-}" ]] && printf '%s\n' "${KEY_ALIASES[@]}" | grep -Fxq -- "${ANDROID_KEY_ALIAS}"; then
            RESOLVED_ALIAS="${ANDROID_KEY_ALIAS}"
          elif [[ "${#KEY_ALIASES[@]}" -eq 1 ]]; then
            RESOLVED_ALIAS="${KEY_ALIASES[0]}"
            echo "ANDROID_KEY_ALIAS secret does not match the keystore; using the only alias in the restored keystore."
          else
            echo "ANDROID_KEY_ALIAS secret does not match any keystore alias, and the keystore contains multiple aliases." >&2
            exit 1
          fi

          echo "::add-mask::${RESOLVED_ALIAS}"
          echo "ANDROID_KEY_ALIAS=${RESOLVED_ALIAS}" >> "${GITHUB_ENV}"

      - name: Build Android APKs
        shell: bash
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          TAURI_ANDROID_VERSION_NAME: ${{ steps.meta.outputs.version }}
          TAURI_ANDROID_VERSION_CODE: ${{ steps.meta.outputs.android_version_code }}
        run: |
          pnpm tauri android build --apk --target aarch64

      - name: Verify APK signature
        shell: bash
        run: |
          # 定位 apksigner（Android build-tools 中）
          APK_SIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner -type f | sort -V | tail -n 1)
          if [[ -z "$APK_SIGNER" ]]; then
            echo "apksigner not found in build-tools" >&2
            exit 1
          fi

          # 定位构建产物
          SOURCE_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*-release.apk" -type f | head -n 1)
          if [[ -z "$SOURCE_APK" || ! -f "$SOURCE_APK" ]]; then
            echo "No release APK found" >&2
            find src-tauri/gen/android/app/build/outputs -name "*.apk" -type f || true
            exit 1
          fi

          echo "APK path: $SOURCE_APK"

          # 1. 验证签名有效性（失败会中断）
          echo "=== apksigner verify ==="
          "$APK_SIGNER" verify -v "$SOURCE_APK"

          # 2. 提取并比对证书指纹（keytool 不支持 v2-only，改用 apksigner）
          echo "=== APK Certificate ==="
          "$APK_SIGNER" verify --print-certs "$SOURCE_APK"

          APK_SHA256=$("$APK_SIGNER" verify --print-certs "$SOURCE_APK" | grep "SHA-256 digest:" | awk '{print $NF}')
          KEYSTORE_SHA256=$(echo "$ANDROID_KEYSTORE_PASSWORD" | keytool -list -v -keystore "$ANDROID_KEYSTORE_PATH" -alias "$ANDROID_KEY_ALIAS" 2>/dev/null | grep "SHA256:" | awk '{print $2}' | tr -d ':' | tr '[:upper:]' '[:lower:]')

          echo "=== Fingerprint Comparison ==="
          echo "APK:      $APK_SHA256"
          echo "Keystore: $KEYSTORE_SHA256"

          if [[ -n "$KEYSTORE_SHA256" && "$APK_SHA256" != "$KEYSTORE_SHA256" ]]; then
            echo "ERROR: APK certificate does NOT match keystore!" >&2
            exit 1
          fi

          # 兜底检查：确保证书不是 Android Debug
          if "$APK_SIGNER" verify --print-certs "$SOURCE_APK" | grep -qi "Android Debug"; then
            echo "ERROR: APK is signed with Android Debug key!" >&2
            exit 1
          fi

          # 3. 保存路径供后续步骤使用
          echo "SOURCE_APK=$SOURCE_APK" >> "$GITHUB_ENV"

      - name: Collect and rename APK artifact
        id: artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts

          source_apk="${{ env.SOURCE_APK }}"
          if [[ -z "$source_apk" || ! -f "$source_apk" ]]; then
            echo "SOURCE_APK not set or file missing" >&2
            exit 1
          fi

          target_apk="release-artifacts/VCPMobile_v${{ steps.meta.outputs.version }}_arm64-v8a.apk"
          cp "$source_apk" "$target_apk"

          # 打包前端热更新资源
          if [[ -d "dist" ]]; then
            frontend_zip="release-artifacts/frontend-dist-v${{ steps.meta.outputs.version }}.zip"
            (cd dist && zip -r "../$frontend_zip" .)
            echo "frontend_zip=$frontend_zip" >> "$GITHUB_ENV"
          fi

          echo "artifact_dir=release-artifacts" >> "$GITHUB_OUTPUT"

      - name: Update GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          append_body: true
          files: |
            ${{ steps.artifacts.outputs.artifact_dir }}/*.apk
            ${{ steps.artifacts.outputs.artifact_dir }}/frontend-dist-*.zip
