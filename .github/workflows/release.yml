name: Android Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  android-release:
    name: Build and Publish Android Release
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '22'
      PNPM_VERSION: '10'
      JAVA_VERSION: '17'
      NDK_VERSION: '29.0.13846066'
      ANDROID_KEYSTORE_PATH: src-tauri/release.keystore
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG_NAME" >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${ANDROID_KEYSTORE_PATH}"
          test -s "${ANDROID_KEYSTORE_PATH}"

      - name: Build Android APKs
        shell: bash
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          pnpm tauri android build --apk --target aarch64-linux-android

      - name: Collect and rename APK artifact
        id: artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          source_apk="src-tauri/gen/android/app/build/outputs/apk/arm64/release/app-arm64-release.apk"
          target_apk="release-artifacts/VCPMobile_v${{ steps.meta.outputs.version }}_arm64-v8a.apk"

          if [[ ! -f "$source_apk" ]]; then
            echo "Expected APK not found: $source_apk" >&2
            exit 1
          fi

          cp "$source_apk" "$target_apk"
          echo "artifact_dir=release-artifacts" >> "$GITHUB_OUTPUT"

      - name: Update GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          append_body: true
          files: |
            ${{ steps.artifacts.outputs.artifact_dir }}/*.apk
