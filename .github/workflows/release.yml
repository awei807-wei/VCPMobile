name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, e.g. v0.9.6'
        required: true

permissions:
  contents: write

jobs:
  android-release:
    name: Build and Publish Android Release
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '22'
      PNPM_VERSION: '10'
      JAVA_VERSION: '17'
      NDK_VERSION: '29.0.13846066'
      ANDROID_KEYSTORE_PATH: src-tauri/release.keystore
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ github.event.inputs.release_tag }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG_NAME" >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> src-tauri/target

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${ANDROID_KEYSTORE_PATH}"
          test -s "${ANDROID_KEYSTORE_PATH}"

      - name: Build Android APKs
        shell: bash
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          pnpm tauri android build --apk --split-per-abi

      - name: Collect and rename APK artifacts
        id: artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          found=0

          declare -A apk_map=(
            [arm64]="arm64-v8a"
            [arm]="armeabi-v7a"
            [x86]="x86"
            [x86_64]="x86_64"
          )

          for dir_name in "${!apk_map[@]}"; do
            source_apk="src-tauri/gen/android/app/build/outputs/apk/${dir_name}/release/app-${dir_name}-release.apk"
            target_abi="${apk_map[$dir_name]}"

            if [[ -f "$source_apk" ]]; then
              cp "$source_apk" "release-artifacts/VCPMobile_v${{ steps.meta.outputs.version }}_${target_abi}.apk"
              found=$((found + 1))
            fi
          done

          if [[ "$found" -eq 0 ]]; then
            echo "No APK artifacts were found in split-per-abi output directories." >&2
            exit 1
          fi

          echo "artifact_dir=release-artifacts" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.artifact_dir }}/*.apk
