<!DOCTYPE html>
<html>
<head>
    <title>Avatar Protocol Debug</title>
</head>
<body>
    <h1>Avatar Protocol Debug</h1>
    <div id="log"></div>
    
    <script>
        function log(msg) {
            const div = document.getElementById('log');
            div.innerHTML += '<p>' + msg + '</p>';
            console.log(msg);
        }
        
        // 测试不同的URI格式
        const testUris = [
            'vcp-avatar://user/user_avatar',
            'https://vcp-avatar.tauri.localhost/user/user_avatar',
            'http://vcp-avatar.tauri.localhost/user/user_avatar'
        ];
        
        testUris.forEach(uri => {
            log('Testing URI: ' + uri);
            const img = new Image();
            img.onload = () => log('✓ Loaded: ' + uri);
            img.onerror = (e) => log('✗ Failed: ' + uri + ' - ' + JSON.stringify({
                src: img.src,
                complete: img.complete,
                naturalWidth: img.naturalWidth
            }));
            img.src = uri + '?t=' + Date.now();
        });
    </script>
</body>
</html>
