<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VCP Assistant</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      body { background-color: transparent; }
      .preloader {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh;
        background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      @media (prefers-color-scheme: light) {
        .preloader { background: linear-gradient(180deg, rgba(0,0,0,0.03) 0%, rgba(0,0,0,0.01) 100%); }
      }
      .preloader-logo { width: 52px; height: 52px; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      .preloader-brand { font-family: monospace; font-size: 10px; letter-spacing: 0.4em; font-weight: 900; color: #3b82f6; opacity: 0.7; margin-top: 20px; text-transform: uppercase; }
      .preloader-hint { font-family: monospace; font-size: 9px; color: #9ca3af; opacity: 0.45; margin-top: 8px; letter-spacing: 0.2em; }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .6; transform: scale(0.94); } }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="preloader">
        <div class="preloader-logo">
          <img src="/vcpmobile.svg" width="100%" height="100%" alt="VCP Assistant" />
        </div>
        <div class="preloader-brand">VCP ASSISTANT</div>
        <div class="preloader-hint">划词助手</div>
      </div>
    </div>
    <script type="module" src="/src/floating-main.ts"></script>
  </body>
</html>
