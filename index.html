<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VCP Mobile</title>
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; }
      body { background-color: #ffffff; }
      @media (prefers-color-scheme: dark) { body { background-color: #030712; } }
      .preloader {
        display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
      }
      .preloader-brand { font-family: monospace; font-size: 11px; letter-spacing: 0.45em; font-weight: 900; color: #3b82f6; opacity: 0.8; margin-top: 32px; text-transform: uppercase;}
      .preloader-logo { width: 80px; height: 80px; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .7; transform: scale(0.95); } }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="preloader">
        <div class="preloader-logo">
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
            <defs>
              <linearGradient id="grad-v-vcp" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00e5ff" />
                <stop offset="50%" stop-color="#3b82f6" />
                <stop offset="100%" stop-color="#ff3366" />
              </linearGradient>
              <filter id="shadow-v-vcp" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#ff3366" flood-opacity="0.3"/>
              </filter>
            </defs>
            <path d="M 45 55 L 100 155 L 155 55" fill="none" stroke="url(#grad-v-vcp)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow-v-vcp)" />
            <circle cx="100" cy="40" r="14" fill="#00e5ff" filter="url(#shadow-v-vcp)" />
          </svg>
        </div>
        <div class="preloader-brand">VCP MOBILE</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
