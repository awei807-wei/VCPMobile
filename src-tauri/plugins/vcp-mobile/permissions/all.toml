[[permission]]
identifier = "allow-all"
description = "Allow all commands in vcp-mobile plugin"
commands.allow = [
    "set_keep_screen_on",
    "clear_keep_screen_on",
    "start_streaming_service",
    "stop_streaming_service",
    "check_all_permissions",
    "request_android_permission",
    "move_task_to_back",
    "pick_file",
    "get_battery_status",
]

